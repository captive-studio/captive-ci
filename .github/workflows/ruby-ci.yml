name: Ruby CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      ruby-image:
        required: false
        type: string
        # renovate: datasource=docker depName=ghcr.io/captive-studio/ruby-ci
        default: ghcr.io/captive-studio/ruby-ci:4.0.6@sha256:ec4690a15ef8a1aa23b2c13e7cd3689256a24faece1f20a335b382f1f5797668

      lint-command:
        required: false
        type: string
        default: rubocop -f github

      test-command:
        required: false
        type: string
        default: bundle exec rspec

      audit-command:
        required: false
        type: string
        default: bundler-audit

      smoke-command:
        required: false
        type: string
        default: ""

      quality-command:
        required: false
        type: string
        default: rubycritic --no-browser

jobs:
  scan_ruby:
    runs-on: captive-small
    timeout-minutes: 10
    container:
      image: ${{ inputs.ruby-image }}
    env:
      BUNDLE_PATH: vendor/bundle

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Cache gems
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: vendor/bundle
          key: gems-${{ runner.os }}-${{ hashFiles('Gemfile.lock') }}
          restore-keys: |
            gems-${{ runner.os }}-

      - name: Install dependencies
        run: bundle install --quiet

      - name: Scan for known security vulnerabilities in gems
        run: ${{ inputs.audit-command }}

  lint:
    runs-on: captive-small
    timeout-minutes: 10
    container:
      image: ${{ inputs.ruby-image }}
    env:
      BUNDLE_PATH: vendor/bundle
      RUBOCOP_CACHE_ROOT: tmp/rubocop

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Cache gems
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: vendor/bundle
          key: gems-${{ runner.os }}-${{ hashFiles('Gemfile.lock') }}
          restore-keys: |
            gems-${{ runner.os }}-

      - name: Install dependencies
        run: bundle install --quiet

      - name: Prepare RuboCop cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.tool-versions', '.ruby-version', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code
        run: ${{ inputs.lint-command }}

  test:
    runs-on: captive-small
    timeout-minutes: 10
    container:
      image: ${{ inputs.ruby-image }}
    env:
      BUNDLE_PATH: vendor/bundle

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Cache gems
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: vendor/bundle
          key: gems-${{ runner.os }}-${{ hashFiles('Gemfile.lock') }}
          restore-keys: |
            gems-${{ runner.os }}-

      - name: Install dependencies
        run: bundle install --quiet

      - name: Run tests
        run: ${{ inputs.test-command }}

      - name: Smoke test
        if: inputs.smoke-command != ''
        run: ${{ inputs.smoke-command }}

  quality:
    if: inputs.quality-command != ''
    runs-on: captive-small
    timeout-minutes: 10
    container:
      image: ${{ inputs.ruby-image }}
    env:
      BUNDLE_PATH: vendor/bundle

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Cache gems
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: vendor/bundle
          key: gems-${{ runner.os }}-${{ hashFiles('Gemfile.lock') }}
          restore-keys: |
            gems-${{ runner.os }}-

      - name: Install dependencies
        run: bundle install --quiet

      - name: Analyse code quality
        run: ${{ inputs.quality-command }}
