name: Ruby CI

on:
  workflow_call:
    inputs:
      ruby-image:
        required: false
        type: string
        # renovate: datasource=docker depName=ghcr.io/captive-studio/ruby-ci
        default: ghcr.io/captive-studio/ruby-ci:4.0.5@sha256:1372875e7363f515bcff543660dfc67c295d33aae945e28bea33965156a49374

      lint-command:
        required: false
        type: string
        default: rubocop -f github

      test-command:
        required: false
        type: string
        default: bundle exec rspec

      audit-command:
        required: false
        type: string
        default: bundler-audit

      smoke-command:
        required: false
        type: string
        default: ""

jobs:
  scan_ruby:
    runs-on: captive-small
    container:
      image: ${{ inputs.ruby-image }}
    env:
      BUNDLE_PATH: vendor/bundle

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Cache gems
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: vendor/bundle
          key: gems-${{ runner.os }}-${{ hashFiles('Gemfile.lock') }}
          restore-keys: |
            gems-${{ runner.os }}-

      - name: Install dependencies
        run: bundle install --quiet

      - name: Scan for known security vulnerabilities in gems
        run: ${{ inputs.audit-command }}

  lint:
    runs-on: captive-small
    container:
      image: ${{ inputs.ruby-image }}
    env:
      BUNDLE_PATH: vendor/bundle
      RUBOCOP_CACHE_ROOT: tmp/rubocop

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Cache gems
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: vendor/bundle
          key: gems-${{ runner.os }}-${{ hashFiles('Gemfile.lock') }}
          restore-keys: |
            gems-${{ runner.os }}-

      - name: Install dependencies
        run: bundle install --quiet

      - name: Prepare RuboCop cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.tool-versions', '.ruby-version', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code
        run: ${{ inputs.lint-command }}

  test:
    runs-on: captive-small
    container:
      image: ${{ inputs.ruby-image }}
    env:
      BUNDLE_PATH: vendor/bundle

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Cache gems
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: vendor/bundle
          key: gems-${{ runner.os }}-${{ hashFiles('Gemfile.lock') }}
          restore-keys: |
            gems-${{ runner.os }}-

      - name: Install dependencies
        run: bundle install --quiet

      - name: Run tests
        run: ${{ inputs.test-command }}

      - name: Smoke test
        if: inputs.smoke-command != ''
        run: ${{ inputs.smoke-command }}

  quality:
    runs-on: captive-small
    container:
      image: ${{ inputs.ruby-image }}
    env:
      BUNDLE_PATH: vendor/bundle

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Cache gems
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: vendor/bundle
          key: gems-${{ runner.os }}-${{ hashFiles('Gemfile.lock') }}
          restore-keys: |
            gems-${{ runner.os }}-

      - name: Install dependencies
        run: bundle install --quiet

      - name: Analyse code quality
        run: bundle exec rubycritic --no-browser